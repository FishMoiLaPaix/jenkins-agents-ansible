---
# Node.js installation

# --- Linux ---

- name: Install NodeSource GPG key
  ansible.builtin.apt_key:
    url: "https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key"
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - nodejs
    - linux

- name: Add NodeSource repository
  ansible.builtin.apt_repository:
    repo: "deb https://deb.nodesource.com/node_{{ nodejs_major_version }}.x nodistro main"
    state: present
    filename: nodesource
  when: ansible_os_family == "Debian"
  tags:
    - nodejs
    - linux

- name: Install Node.js on Linux
  ansible.builtin.apt:
    name: nodejs
    state: latest
    update_cache: true
  when: ansible_os_family == "Debian"
  tags:
    - nodejs
    - linux

# --- Windows ---

- name: Install Node.js on Windows
  chocolatey.chocolatey.win_chocolatey:
    name: "nodejs-lts"
    version: "{{ nodejs_version }}"
    state: present
  when: ansible_os_family == "Windows"
  tags:
    - nodejs
    - windows

- name: Install Python on Windows
  chocolatey.chocolatey.win_chocolatey:
    name: python3
    version: "{{ python_version }}"
    state: present
  when: ansible_os_family == "Windows"
  tags:
    - python
    - windows

- name: Install Git on Windows
  chocolatey.chocolatey.win_chocolatey:
    name: git
    version: "{{ git_version }}"
    state: present
  when: ansible_os_family == "Windows"
  tags:
    - git
    - windows
