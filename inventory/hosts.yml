all:
  children:
    linux:
      vars:
        # After bootstrap, all playbooks use the ansible admin user
        ansible_user: ansible
        ansible_ssh_private_key_file: "~/.ssh/ansible-agents"
        ansible_become: true
      hosts:
        ubuntu-docker-agent-HP:
          ansible_host: 192.168.0.40
          ansible_port: 2222
          # Jump through persoIA since VPN doesn't route to .40
          ansible_ssh_common_args: >-
            -o ProxyCommand="ssh -o IdentitiesOnly=yes -i ~/.ssh/ai-workstation -W %h:%p smerle@192.168.0.46"
          agent_executors: 4
          agent_description: "HP Ubuntu Docker agent at maison.thefrenchies.com"
          agent_wan_host: "maison.thefrenchies.com"
          agent_wan_port: 2222

        ubuntu-docker-agent-persoIA:
          ansible_host: 192.168.0.46
          ansible_port: 22
          agent_executors: 8
          agent_description: "Ubuntu 24.04 Docker agent on AI workstation (62GB RAM, 1.8TB disk)"
          agent_wan_host: "maison.thefrenchies.com"
          agent_wan_port: 2223
          docker_already_installed: true

    windows:
      hosts:
        windows-docker-agent:
          ansible_host: "{{ vault_windows_agent_ip | default('CONFIGURE_ME') }}"
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
          ansible_user: "{{ vault_windows_user | default('CONFIGURE_ME') }}"
          ansible_password: "{{ vault_windows_password | default('CONFIGURE_ME') }}"
          agent_executors: 2
          agent_description: "Windows Docker agent with JNLP inbound connection"
          agent_workspace: 'D:\Jenkins\agent'
          agent_connection_type: jnlp

# Bootstrap overrides - used only for the initial bootstrap playbook
# ansible-playbook -i inventory/hosts.yml playbooks/bootstrap.yml \
#   -e ansible_user=smerle \
#   -e ansible_ssh_private_key_file=~/.ssh/ai-workstation \
#   -e 'ansible_ssh_common_args=-o IdentitiesOnly=yes' \
#   --ask-become-pass --limit ubuntu-docker-agent-persoIA
