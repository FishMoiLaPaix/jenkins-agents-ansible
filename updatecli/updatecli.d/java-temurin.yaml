---
name: "Update Java Temurin 21 version"

scms:
  default:
    kind: github
    spec:
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      branch: "{{ .github.branch }}"
      user: updatecli

sources:
  temurin21:
    name: "Get latest Temurin 21 release"
    kind: githubrelease
    spec:
      owner: adoptium
      repository: temurin21-binaries
      versionfilter:
        kind: regex
        pattern: 'jdk-21\.(\d+)\.(\d+)\+(\d+)$'
    transformers:
      - trimprefix: "jdk-"

targets:
  linux-java-version:
    name: "Update Java version in Linux group_vars"
    kind: yaml
    scmid: default
    sourceid: temurin21
    spec:
      file: inventory/group_vars/linux.yml
      key: "$.java_version"

actions:
  default:
    kind: github/pullrequest
    scmid: default
    spec:
      title: 'chore: update Java Temurin to {{ source "temurin21" }}'
      labels:
        - dependencies
