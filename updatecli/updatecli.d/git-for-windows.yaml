---
name: "Update Git for Windows version"

scms:
  default:
    kind: github
    spec:
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      branch: "{{ .github.branch }}"
      user: updatecli
      token: '{{ requiredEnv "UPDATECLI_GITHUB_TOKEN" }}'

sources:
  git:
    name: "Get latest Git for Windows release"
    kind: githubrelease
    spec:
      token: '{{ requiredEnv "UPDATECLI_GITHUB_TOKEN" }}'
      owner: git-for-windows
      repository: git
      versionfilter:
        kind: regex
        pattern: 'v(\d+\.\d+\.\d+)\.windows\.\d+$'
    transformers:
      - trimprefix: "v"
      - find: '\.windows\.\d+$'
        replace: ""

targets:
  windows-git-version:
    name: "Update Git version in Windows group_vars"
    kind: yaml
    scmid: default
    sourceid: git
    spec:
      file: inventory/group_vars/windows.yml
      key: "$.git_version"

actions:
  default:
    kind: github/pullrequest
    scmid: default
    spec:
      title: 'chore: update Git for Windows to {{ source "git" }}'
      labels:
        - dependencies
