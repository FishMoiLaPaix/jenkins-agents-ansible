---
# Verify all Jenkins agents are properly configured

- name: Verify Linux Jenkins agents
  hosts: linux
  become: false
  gather_facts: true
  tags: [verify]

  tasks:
    - name: Check Java version
      ansible.builtin.command: java -version
      register: java_version
      changed_when: false
      failed_when: "'21' not in java_version.stderr"
      tags: [java]

    - name: Display Java version
      ansible.builtin.debug:
        msg: "{{ java_version.stderr_lines[0] }}"
      tags: [java]

    - name: Check Docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false
      tags: [docker]

    - name: Display Docker version
      ansible.builtin.debug:
        msg: "{{ docker_version.stdout }}"
      tags: [docker]

    - name: Check Docker daemon is running
      ansible.builtin.command: pgrep -x dockerd
      register: docker_service
      changed_when: false
      failed_when: docker_service.rc != 0
      tags: [docker]

    - name: Verify Docker service status
      ansible.builtin.debug:
        msg: "Docker daemon is running (pid {{ docker_service.stdout_lines[0] }})"
      tags: [docker]

    - name: Check jenkins-agent user exists
      ansible.builtin.command: id {{ jenkins_agent_user }}
      register: agent_user
      changed_when: false
      tags: [jenkins-agent]

    - name: Display jenkins-agent user info
      ansible.builtin.debug:
        msg: "{{ agent_user.stdout }}"
      tags: [jenkins-agent]

    - name: Check jenkins-agent is in docker group
      ansible.builtin.command: groups {{ jenkins_agent_user }}
      register: agent_groups
      changed_when: false
      failed_when: "'docker' not in agent_groups.stdout"
      tags: [jenkins-agent, docker]

    - name: Check workspace directory exists
      ansible.builtin.command: test -d {{ jenkins_agent_workspace }}
      become: true
      register: workspace_dir
      changed_when: false
      failed_when: workspace_dir.rc != 0
      tags: [jenkins-agent]

    - name: Verify workspace directory
      ansible.builtin.debug:
        msg: "Workspace directory {{ jenkins_agent_workspace }} exists"
      tags: [jenkins-agent]

    - name: Check JAVA_HOME in jenkins-agent bashrc
      ansible.builtin.command: grep JAVA_HOME {{ jenkins_agent_home }}/.bashrc
      become: true
      register: java_home_check
      changed_when: false
      failed_when: java_home_check.rc != 0
      tags: [java, jenkins-agent]

    - name: Check disk space
      ansible.builtin.command: df -h /
      register: disk_space
      changed_when: false
      tags: [system]

    - name: Display disk space
      ansible.builtin.debug:
        msg: "{{ disk_space.stdout_lines }}"
      tags: [system]

    - name: Check memory
      ansible.builtin.command: free -h
      register: memory_info
      changed_when: false
      tags: [system]

    - name: Display memory info
      ansible.builtin.debug:
        msg: "{{ memory_info.stdout_lines }}"
      tags: [system]

    - name: Summary
      ansible.builtin.debug:
        msg: >
          Agent {{ inventory_hostname }} verification complete:
          Java={{ java_version.stderr_lines[0] }},
          Docker={{ docker_version.stdout }},
          User={{ agent_user.stdout }}

- name: Verify Windows Jenkins agent
  hosts: windows
  gather_facts: true
  tags: [verify, windows]

  tasks:
    - name: Check Java version
      ansible.windows.win_command: java -version
      register: win_java_version
      changed_when: false
      tags: [java]

    - name: Display Java version
      ansible.builtin.debug:
        msg: "{{ win_java_version.stderr_lines[0] | default('Java not found') }}"
      tags: [java]

    - name: Check Docker version
      ansible.windows.win_command: docker --version
      register: win_docker_version
      changed_when: false
      tags: [docker]

    - name: Display Docker version
      ansible.builtin.debug:
        msg: "{{ win_docker_version.stdout | default('Docker not found') }}"
      tags: [docker]

    - name: Check Node.js version
      ansible.windows.win_command: node --version
      register: win_node_version
      changed_when: false
      tags: [nodejs]

    - name: Display Node.js version
      ansible.builtin.debug:
        msg: "{{ win_node_version.stdout | default('Node.js not found') }}"
      tags: [nodejs]

    - name: Check Python version
      ansible.windows.win_command: python --version
      register: win_python_version
      changed_when: false
      tags: [python]

    - name: Display Python version
      ansible.builtin.debug:
        msg: "{{ win_python_version.stdout | default('Python not found') }}"
      tags: [python]

    - name: Check Git version
      ansible.windows.win_command: git --version
      register: win_git_version
      changed_when: false
      tags: [git]

    - name: Display Git version
      ansible.builtin.debug:
        msg: "{{ win_git_version.stdout | default('Git not found') }}"
      tags: [git]

    - name: Check workspace directory exists
      ansible.windows.win_stat:
        path: "{{ jenkins_agent_workspace }}"
      register: win_workspace_dir
      tags: [jenkins-agent]

    - name: Verify workspace directory
      ansible.builtin.assert:
        that:
          - win_workspace_dir.stat.exists
        fail_msg: "Workspace directory {{ jenkins_agent_workspace }} does not exist"
        success_msg: "Workspace directory {{ jenkins_agent_workspace }} exists"
      tags: [jenkins-agent]

    - name: Summary
      ansible.builtin.debug:
        msg: >
          Agent {{ inventory_hostname }} verification complete:
          Java={{ win_java_version.stderr_lines[0] | default('N/A') }},
          Docker={{ win_docker_version.stdout | default('N/A') }},
          Node={{ win_node_version.stdout | default('N/A') }},
          Python={{ win_python_version.stdout | default('N/A') }},
          Git={{ win_git_version.stdout | default('N/A') }}
